---
- name: Configurar VM6 - Motor Analítico
  hosts: VM6
  become: yes
  gather_facts: no

  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    vm6_dir: /root/vm6-motor
    mac_ens3: "{{ mac_net0 }}"   # labredes1
    mac_ens4: "{{ mac_net1 }}"
    vm1_url: "http://10.99.20.10/api/v1/flows/"
    vm1_user: "admin"
    vm1_pass: "admin123"

  tasks:
    - name: Aguardar SSH ficar disponível
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Coletar informações do sistema
      setup:

    - name: Gerar configuração netplan da VM6
      copy:
        dest: /etc/netplan/99-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              ens3:
                match:
                  macaddress: "{{ mac_ens3 }}"
                dhcp4: true
                mtu: 1450

              ens4:
                match:
                  macaddress: "{{ mac_ens4 }}"
                dhcp4: false
                addresses:
                  - 10.99.20.20/24
                nameservers:
                  addresses:
                    - 8.8.8.8
                    - 1.1.1.1
                mtu: 1450

    - name: Aplicar Netplan
      shell: "sleep 2 && reboot"
      async: 45
      poll: 0

    - name: Aguardar rede voltar
      wait_for_connection:
        delay: 10
        timeout: 180
      ignore_errors: yes

    - name: Atualizar cache de pacotes
      apt:
        update_cache: yes

    - name: Instalar Docker via script oficial
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Habilitar e iniciar serviço Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Parar serviço systemd antigo (motor.service), se existir
      systemd:
        name: motor.service
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Criar diretório do projeto
      file:
        path: "{{ vm6_dir }}"
        state: directory

    - name: Criar docker-compose.yml da VM6
      copy:
        dest: "{{ vm6_dir }}/docker-compose.yml"
        content: |
          services:
            motor-analitico:
              image: juniorgui/labredes_vm6:v1
              container_name: motor-analitico
              network_mode: host
              restart: unless-stopped
              environment:
                - VM1_URL={{ vm1_url }}
                - VM1_USER={{ vm1_user }}
                - VM1_PASS={{ vm1_pass }}

    - name: Subir container motor-analitico
      command: docker compose up -d
      args:
        chdir: "{{ vm6_dir }}"

    - name: Verificar se container está rodando
      command: docker ps --filter "name=motor-analitico" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: container_status

    - name: Exibir status do container
      debug:
        msg: "VM6 container status: {{ container_status.stdout }}"

    - name: Testar endpoint de saúde (/health)
      uri:
        url: "http://localhost:8000/health"
        status_code: 200
      register: health_check
      ignore_errors: yes
      delay: 5
      retries: 5

    - name: Testar endpoint da matriz de tráfego
      uri:
        url: "http://localhost:8000/gerar-matriz"
        status_code: 200
      register: matriz_check
      ignore_errors: yes
      delay: 5
      retries: 3
