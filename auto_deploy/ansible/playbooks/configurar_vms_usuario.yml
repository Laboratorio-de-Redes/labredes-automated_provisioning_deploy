---
- name: "VM_DEV — Configuração básica de rede"
  hosts: VM_DEV
  become: yes
  gather_facts: no

  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    mac_ens3: "{{ mac_net0 }}"
    mac_ens4: "{{ mac_net1 }}"

  tasks:
    - name: Aguardar SSH ficar disponível
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Coletar informações do sistema
      setup:

    - name: Gerar configuração netplan da VM_DEV
      copy:
        dest: /etc/netplan/99-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              ens3:
                match:
                  macaddress: "{{ mac_ens3 }}"
                dhcp4: true
                mtu: 1450

              ens4:
                match:
                  macaddress: "{{ mac_ens4 }}"
                dhcp4: false
                addresses:
                  - 10.99.50.10/24
                nameservers:
                  addresses:
                    - 8.8.8.8
                    - 1.1.1.1
                mtu: 1450

    - name: Aplicar Netplan
      shell: "sleep 2 && reboot"
      async: 45
      poll: 0

    - name: Aguardar rede voltar
      wait_for_connection:
        delay: 10
        timeout: 180
      ignore_errors: yes

