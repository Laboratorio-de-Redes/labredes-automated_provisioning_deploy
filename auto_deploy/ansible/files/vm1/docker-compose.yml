services:
  postgres:
    image: postgres:15
    container_name: vm1_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vm1_net
  fastapi:
    image: miguelgrigorio27/vm1_fastapi
    container_name: vm1_fastapi
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vm1_net
  nginx:
    image: nginx:alpine
    container_name: vm1_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
    networks:
      - vm1_net
  adminer:
    image: adminer:latest
    container_name: vm1_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - vm1_net
volumes:
  pg_data:
    name: vm1_postgres_data
networks:
  vm1_net:
    name: vm1_network
    driver: bridge
