version: "3.9"
services:
  flow-generator:
    image: salmarino/flow-generator:latest
    container_name: flow-generator
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
