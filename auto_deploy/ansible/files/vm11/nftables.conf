#!/usr/sbin/nft -f

table inet filter { }
flush table inet filter
table ip nat_custom { }
flush table ip nat_custom

table inet filter {
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept
        ip protocol icmp accept

        iifname "docker0" accept
        iifname "br-*" accept

        # VLANs podem sair pela interface de internet
        iifname "ens4*" oifname "ens3" accept

        # USERS (VLAN60) → SERVER (VLAN20): HTTP/HTTPS permitido
        iifname "ens4.60" oifname "ens4.20" tcp dport { 80, 443 } counter accept

        # USERS (VLAN60) → MGMT (VLAN10): Bloqueado
        iifname "ens4.60" oifname "ens4.10" counter drop

        # DMZ (VLAN30) → SERVER (VLAN20): HTTPS permitido
        iifname "ens4.30" oifname "ens4.20" tcp dport { 443 } counter accept

        # MONITOR (VLAN40) → NETDEV (VLAN50): SNMP permitido
        iifname "ens4.40" oifname "ens4.50" udp dport 161 counter accept

        # MGMT (VLAN10) → SERVER (VLAN20): SSH permitido
        iifname "ens4.10" oifname "ens4.20" tcp dport 22 counter accept

        # LDAP (VM9 10.0.10.10:389) acessível de todas as VLANs
        ip daddr 10.0.10.10 tcp dport { 389, 636 } counter accept

        # Log com rate-limit para evitar flood de disco
        counter limit rate 10/second log prefix "DROP_DEFAULT: " drop
        counter drop
    }

    chain input  { type filter hook input  priority 0; policy accept; }
    chain output { type filter hook output priority 0; policy accept; }
}

table ip nat_custom {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname "ens3" masquerade
    }
}
